name: Coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --json --output-path coverage.json
      - name: Extract coverage percentage
        id: cov
        run: |
          COV=$(python3 - <<'PY'
          import json

          with open("coverage.json", encoding="utf-8") as f:
              data = json.load(f)

          percent = data["data"][0]["totals"]["lines"]["percent"]
          print(f"{percent:.1f}")
          PY
          )
          echo "percent=$COV" >> "$GITHUB_OUTPUT"
          echo "### Coverage: ${COV}%" >> "$GITHUB_STEP_SUMMARY"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 0d02060b27bfee904bf5b805102ea382
          filename: organism-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.percent }}%
          valColorRange: ${{ steps.cov.outputs.percent }}
          minColorRange: 0
          maxColorRange: 100
