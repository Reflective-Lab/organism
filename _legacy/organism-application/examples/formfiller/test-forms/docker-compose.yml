services:
  # Static form server (nginx) - port 8080
  forms:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./forms:/usr/share/nginx/html:ro
    restart: unless-stopped

  # Logging backend (Node.js) - port 3001
  logger:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - ./forms:/app/forms:ro
    command: node server.js
    restart: unless-stopped
