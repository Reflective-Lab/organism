<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundenkät</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Tillbaka till formulärlistan</a>

    <div class="form-container">
        <div class="form-header" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); border-top-color: #c9a44d;">
            <h1>Kundenkät</h1>
            <p>Hjälp oss förbättra vår service</p>
        </div>

        <form id="surveyForm" action="#" method="post">
            <div class="form-body">
                <div class="success-message" id="successMsg">
                    Tack för din feedback! Dina svar hjälper oss att förbättras.
                </div>

                <div class="form-section">
                    <h2>Om dig (valfritt)</h2>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="fornamn">Förnamn</label>
                            <input type="text" id="fornamn" name="fornamn">
                        </div>
                        <div class="form-group">
                            <label for="efternamn">Efternamn</label>
                            <input type="text" id="efternamn" name="efternamn">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="epost">E-post</label>
                        <input type="email" id="epost" name="epost">
                        <div class="help-text">Ange om du vill att vi kontaktar dig</div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Din upplevelse</h2>

                    <div class="form-group">
                        <label class="required">Hur nöjd är du överlag?</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="nojdhet" value="5" required>
                                <span>Mycket nöjd</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="nojdhet" value="4">
                                <span>Ganska nöjd</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="nojdhet" value="3">
                                <span>Neutral</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="nojdhet" value="2">
                                <span>Ganska missnöjd</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="nojdhet" value="1">
                                <span>Mycket missnöjd</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="required">Hur sannolikt är det att du rekommenderar oss? (1-10)</label>
                        <select id="nps" name="nps" required>
                            <option value="">-- Välj --</option>
                            <option value="10">10 - Absolut</option>
                            <option value="9">9</option>
                            <option value="8">8</option>
                            <option value="7">7</option>
                            <option value="6">6</option>
                            <option value="5">5</option>
                            <option value="4">4</option>
                            <option value="3">3</option>
                            <option value="2">2</option>
                            <option value="1">1 - Aldrig</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Vad tycker du om...</h2>

                    <div class="form-group">
                        <label class="required">Produktkvalitet</label>
                        <div class="radio-group" style="flex-direction: row; flex-wrap: wrap;">
                            <label class="radio-option">
                                <input type="radio" name="kvalitet" value="5" required>
                                <span>Utmärkt</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="kvalitet" value="4">
                                <span>Bra</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="kvalitet" value="3">
                                <span>Okej</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="kvalitet" value="2">
                                <span>Dålig</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="required">Kundservice</label>
                        <div class="radio-group" style="flex-direction: row; flex-wrap: wrap;">
                            <label class="radio-option">
                                <input type="radio" name="service" value="5" required>
                                <span>Utmärkt</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="service" value="4">
                                <span>Bra</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="service" value="3">
                                <span>Okej</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="service" value="2">
                                <span>Dålig</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="required">Prissättning</label>
                        <div class="radio-group" style="flex-direction: row; flex-wrap: wrap;">
                            <label class="radio-option">
                                <input type="radio" name="pris" value="5" required>
                                <span>Utmärkt</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="pris" value="4">
                                <span>Bra</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="pris" value="3">
                                <span>Okej</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="pris" value="2">
                                <span>Dålig</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Öppna frågor</h2>

                    <div class="form-group">
                        <label for="bast">Vad gillar du bäst med oss?</label>
                        <textarea id="bast" name="bast" placeholder="Berätta vad du uppskattar..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="forbattra">Vad kan vi förbättra?</label>
                        <textarea id="forbattra" name="forbattra" placeholder="Ge oss förslag på förbättringar..."></textarea>
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Skicka enkät</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('surveyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.add('show');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
<script src="formfiller-logger.js"></script>
</body>
</html>
