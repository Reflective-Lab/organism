<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bostadsansökan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Tillbaka till formulärlistan</a>

    <div class="form-container">
        <div class="form-header" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); border-top-color: #0d7d71;">
            <h1>Bostadsansökan</h1>
            <p>Ansökan till bostadskö</p>
        </div>

        <form id="housingForm" action="#" method="post">
            <div class="form-body">
                <div class="success-message" id="successMsg">
                    Din ansökan har registrerats! Kötid börjar räknas från idag.
                </div>

                <div class="form-section">
                    <h2>Sökande</h2>

                    <div class="form-group">
                        <label for="personnummer" class="required">Personnummer</label>
                        <input type="text" id="personnummer" name="personnummer" required>
                    </div>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="fornamn" class="required">Förnamn</label>
                            <input type="text" id="fornamn" name="fornamn" required>
                        </div>
                        <div class="form-group">
                            <label for="efternamn" class="required">Efternamn</label>
                            <input type="text" id="efternamn" name="efternamn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="epost" class="required">E-post</label>
                        <input type="email" id="epost" name="epost" required>
                    </div>

                    <div class="form-group">
                        <label for="telefon" class="required">Telefon</label>
                        <input type="tel" id="telefon" name="telefon" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Nuvarande adress</h2>

                    <div class="form-group">
                        <label for="gatuadress" class="required">Gatuadress</label>
                        <input type="text" id="gatuadress" name="gatuadress" required>
                    </div>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="postnummer" class="required">Postnummer</label>
                            <input type="text" id="postnummer" name="postnummer" required
                                   pattern="\d{3}\s?\d{2}">
                        </div>
                        <div class="form-group">
                            <label for="ort" class="required">Ort</label>
                            <input type="text" id="ort" name="ort" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Bostadsönskemål</h2>

                    <div class="form-group">
                        <label for="bostadstyp" class="required">Önskad bostadstyp</label>
                        <select id="bostadstyp" name="bostadstyp" required>
                            <option value="">-- Välj --</option>
                            <option value="1rok">1 rum och kök</option>
                            <option value="2rok">2 rum och kök</option>
                            <option value="3rok">3 rum och kök</option>
                            <option value="4rok">4 rum och kök</option>
                            <option value="5rok">5+ rum och kök</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="maxhyra">Maximal månadshyra (kr)</label>
                        <input type="number" id="maxhyra" name="maxhyra"
                               placeholder="Ex: 12000" min="3000" max="50000">
                    </div>

                    <div class="form-group">
                        <label>Önskade områden</label>
                        <div class="checkbox-group">
                            <label class="checkbox-option">
                                <input type="checkbox" name="omrade" value="centrum">
                                <span>Centrum</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="omrade" value="sodermalm">
                                <span>Södermalm</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="omrade" value="ostermalm">
                                <span>Östermalm</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="omrade" value="kungsholmen">
                                <span>Kungsholmen</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Motivation</h2>

                    <div class="form-group">
                        <label for="motivation" class="required">Varför söker du bostad?</label>
                        <textarea id="motivation" name="motivation" required
                                  placeholder="Beskriv din situation och varför du söker bostad..."></textarea>
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Skicka ansökan</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('housingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.add('show');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
<script src="formfiller-logger.js"></script>
</body>
</html>
