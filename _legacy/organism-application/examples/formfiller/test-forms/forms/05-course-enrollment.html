<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursanmälan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Tillbaka till formulärlistan</a>

    <div class="form-container">
        <div class="form-header" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); border-top-color: #c75a7a;">
            <h1>Kursanmälan</h1>
            <p>Vuxenutbildning - Hösten 2025</p>
        </div>

        <form id="courseForm" action="#" method="post">
            <div class="form-body">
                <div class="success-message" id="successMsg">
                    Din kursanmälan har registrerats! Antagningsbesked skickas i juni.
                </div>

                <div class="form-section">
                    <h2>Personuppgifter</h2>

                    <div class="form-group">
                        <label for="personnummer" class="required">Personnummer</label>
                        <input type="text" id="personnummer" name="personnummer" required
                               placeholder="ÅÅÅÅMMDD-XXXX">
                    </div>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="fornamn" class="required">Förnamn</label>
                            <input type="text" id="fornamn" name="fornamn" required>
                        </div>
                        <div class="form-group">
                            <label for="efternamn" class="required">Efternamn</label>
                            <input type="text" id="efternamn" name="efternamn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="epost" class="required">E-post</label>
                        <input type="email" id="epost" name="epost" required>
                    </div>

                    <div class="form-group">
                        <label for="telefon" class="required">Telefon</label>
                        <input type="tel" id="telefon" name="telefon" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Kursval (välj upp till 3)</h2>

                    <div class="form-group">
                        <label for="kurs1" class="required">Förstahandsval</label>
                        <select id="kurs1" name="kurs1" required>
                            <option value="">-- Välj kurs --</option>
                            <option value="prog1">Programmering 1</option>
                            <option value="prog2">Programmering 2</option>
                            <option value="webb1">Webbutveckling 1</option>
                            <option value="webb2">Webbutveckling 2</option>
                            <option value="databas">Databaser</option>
                            <option value="natverk">Nätverksteknik</option>
                            <option value="java">Java-programmering</option>
                            <option value="python">Python-programmering</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="kurs2">Andrahandsval</label>
                        <select id="kurs2" name="kurs2">
                            <option value="">-- Välj kurs --</option>
                            <option value="prog1">Programmering 1</option>
                            <option value="prog2">Programmering 2</option>
                            <option value="webb1">Webbutveckling 1</option>
                            <option value="webb2">Webbutveckling 2</option>
                            <option value="databas">Databaser</option>
                            <option value="natverk">Nätverksteknik</option>
                            <option value="java">Java-programmering</option>
                            <option value="python">Python-programmering</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="kurs3">Tredjehandsval</label>
                        <select id="kurs3" name="kurs3">
                            <option value="">-- Välj kurs --</option>
                            <option value="prog1">Programmering 1</option>
                            <option value="prog2">Programmering 2</option>
                            <option value="webb1">Webbutveckling 1</option>
                            <option value="webb2">Webbutveckling 2</option>
                            <option value="databas">Databaser</option>
                            <option value="natverk">Nätverksteknik</option>
                            <option value="java">Java-programmering</option>
                            <option value="python">Python-programmering</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Studieform</h2>

                    <div class="form-group">
                        <label class="required">Önskad studietakt</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="studietakt" value="heltid" required>
                                <span>Heltid (100%)</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="studietakt" value="halvtid">
                                <span>Halvtid (50%)</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="studietakt" value="kvart">
                                <span>Kvartstid (25%)</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="required">Studieform</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="studieform" value="campus" required>
                                <span>Campus (på plats)</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="studieform" value="distans">
                                <span>Distans</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="studieform" value="flex">
                                <span>Flexibel (blandat)</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <div class="checkbox-option">
                            <input type="checkbox" id="gdpr" name="gdpr" required>
                            <span>Jag godkänner att mina uppgifter behandlas enligt GDPR *</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Skicka anmälan</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('courseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.add('show');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
<script src="formfiller-logger.js"></script>
</body>
</html>
