<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobbansökan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Tillbaka till formulärlistan</a>

    <div class="form-container">
        <div class="form-header" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-top-color: #2d8ac7;">
            <h1>Jobbansökan</h1>
            <p>Senior Utvecklare - Stockholm</p>
        </div>

        <form id="jobForm" action="#" method="post">
            <div class="form-body">
                <div class="success-message" id="successMsg">
                    Tack för din ansökan! Vi återkommer inom 5 arbetsdagar.
                </div>

                <div class="form-section">
                    <h2>Personuppgifter</h2>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="fornamn" class="required">Förnamn</label>
                            <input type="text" id="fornamn" name="fornamn" required>
                        </div>
                        <div class="form-group">
                            <label for="efternamn" class="required">Efternamn</label>
                            <input type="text" id="efternamn" name="efternamn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="epost" class="required">E-post</label>
                        <input type="email" id="epost" name="epost" required>
                    </div>

                    <div class="form-group">
                        <label for="telefon" class="required">Telefon</label>
                        <input type="tel" id="telefon" name="telefon" required>
                    </div>

                    <div class="form-group">
                        <label for="adress">Adress</label>
                        <input type="text" id="adress" name="adress">
                    </div>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="postnummer">Postnummer</label>
                            <input type="text" id="postnummer" name="postnummer">
                        </div>
                        <div class="form-group">
                            <label for="stad">Stad</label>
                            <input type="text" id="stad" name="stad">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Erfarenhet</h2>

                    <div class="form-group">
                        <label for="erfarenhet" class="required">År av erfarenhet</label>
                        <select id="erfarenhet" name="erfarenhet" required>
                            <option value="">-- Välj --</option>
                            <option value="0-2">0-2 år</option>
                            <option value="3-5">3-5 år</option>
                            <option value="6-10">6-10 år</option>
                            <option value="10+">10+ år</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="linkedin">LinkedIn-profil</label>
                        <input type="text" id="linkedin" name="linkedin"
                               placeholder="https://linkedin.com/in/...">
                    </div>

                    <div class="form-group">
                        <label for="github">GitHub/Portfolio</label>
                        <input type="text" id="github" name="github"
                               placeholder="https://github.com/...">
                    </div>
                </div>

                <div class="form-section">
                    <h2>Ansökan</h2>

                    <div class="form-group">
                        <label for="personligt_brev" class="required">Personligt brev</label>
                        <textarea id="personligt_brev" name="personligt_brev" required
                                  placeholder="Berätta om dig själv och varför du söker denna tjänst..."
                                  style="min-height: 200px;"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="lon">Löneanspråk (kr/mån)</label>
                        <input type="number" id="lon" name="lon"
                               placeholder="Ex: 55000" min="20000" max="150000">
                    </div>

                    <div class="form-group">
                        <label for="startdatum">Möjligt startdatum</label>
                        <input type="date" id="startdatum" name="startdatum">
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Skicka ansökan</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('jobForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.add('show');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
<script src="formfiller-logger.js"></script>
</body>
</html>
