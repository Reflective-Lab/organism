<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokningsformulär</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Tillbaka till formulärlistan</a>

    <div class="form-container">
        <div class="form-header" style="background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); border-top-color: #4d8fd9;">
            <h1>Boka tid</h1>
            <p>Välj en tid som passar dig</p>
        </div>

        <form id="bookingForm" action="#" method="post">
            <div class="form-body">
                <div class="success-message" id="successMsg">
                    Din bokning är bekräftad! Påminnelse skickas till din e-post.
                </div>

                <div class="form-section">
                    <h2>Kontaktuppgifter</h2>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="fornamn" class="required">Förnamn</label>
                            <input type="text" id="fornamn" name="fornamn" required>
                        </div>
                        <div class="form-group">
                            <label for="efternamn" class="required">Efternamn</label>
                            <input type="text" id="efternamn" name="efternamn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="personnummer">Personnummer</label>
                        <input type="text" id="personnummer" name="personnummer"
                               placeholder="ÅÅÅÅMMDD-XXXX">
                    </div>

                    <div class="form-group">
                        <label for="epost" class="required">E-post</label>
                        <input type="email" id="epost" name="epost" required>
                    </div>

                    <div class="form-group">
                        <label for="telefon" class="required">Telefon</label>
                        <input type="tel" id="telefon" name="telefon" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Tjänst</h2>

                    <div class="form-group">
                        <label for="tjanst" class="required">Välj tjänst</label>
                        <select id="tjanst" name="tjanst" required>
                            <option value="">-- Välj tjänst --</option>
                            <option value="konsultation">Konsultation (30 min) - Gratis</option>
                            <option value="standard">Standardmöte (60 min) - 500 kr</option>
                            <option value="fordjupat">Fördjupat möte (90 min) - 750 kr</option>
                            <option value="workshop">Workshop (3 tim) - 2000 kr</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="plats" class="required">Plats</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="plats" value="kontor" required>
                                <span>På vårt kontor</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="plats" value="video">
                                <span>Videomöte (Zoom/Teams)</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="plats" value="telefon">
                                <span>Telefonmöte</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Tid</h2>

                    <div class="form-group">
                        <label for="datum" class="required">Datum</label>
                        <input type="date" id="datum" name="datum" required>
                    </div>

                    <div class="form-group">
                        <label for="tid" class="required">Tid</label>
                        <select id="tid" name="tid" required>
                            <option value="">-- Välj tid --</option>
                            <option value="09:00">09:00</option>
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="13:00">13:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                            <option value="16:00">16:00</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Övrigt</h2>

                    <div class="form-group">
                        <label for="meddelande">Meddelande</label>
                        <textarea id="meddelande" name="meddelande"
                                  placeholder="Berätta kort vad du vill diskutera..."></textarea>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-option">
                            <input type="checkbox" id="paminnelse" name="paminnelse" checked>
                            <span>Skicka påminnelse via SMS dagen innan</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Boka tid</button>
            </div>
        </form>
    </div>

    <script>
        // Set minimum date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('datum').min = tomorrow.toISOString().split('T')[0];

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.add('show');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
<script src="formfiller-logger.js"></script>
</body>
</html>
