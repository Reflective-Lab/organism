<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medlemsansökan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Tillbaka till formulärlistan</a>

    <div class="form-container">
        <div class="form-header" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); border-top-color: #7a5fa8;">
            <h1>Medlemsansökan</h1>
            <p>Bli medlem i Teknikföreningen</p>
        </div>

        <form id="memberForm" action="#" method="post">
            <div class="form-body">
                <div class="success-message" id="successMsg">
                    Välkommen som medlem! Bekräftelse skickas till din e-post.
                </div>

                <div class="form-section">
                    <h2>Personuppgifter</h2>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="fornamn" class="required">Förnamn</label>
                            <input type="text" id="fornamn" name="fornamn" required>
                        </div>
                        <div class="form-group">
                            <label for="efternamn" class="required">Efternamn</label>
                            <input type="text" id="efternamn" name="efternamn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="personnummer">Personnummer</label>
                        <input type="text" id="personnummer" name="personnummer">
                    </div>

                    <div class="form-group">
                        <label for="fodelsedatum">Födelsedatum</label>
                        <input type="date" id="fodelsedatum" name="fodelsedatum">
                    </div>
                </div>

                <div class="form-section">
                    <h2>Kontaktuppgifter</h2>

                    <div class="form-group">
                        <label for="epost" class="required">E-post</label>
                        <input type="email" id="epost" name="epost" required>
                    </div>

                    <div class="form-group">
                        <label for="telefon" class="required">Telefon</label>
                        <input type="tel" id="telefon" name="telefon" required>
                    </div>

                    <div class="form-group">
                        <label for="adress">Adress</label>
                        <input type="text" id="adress" name="adress">
                    </div>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="postnummer">Postnummer</label>
                            <input type="text" id="postnummer" name="postnummer">
                        </div>
                        <div class="form-group">
                            <label for="ort">Ort</label>
                            <input type="text" id="ort" name="ort">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Medlemskap</h2>

                    <div class="form-group">
                        <label class="required">Medlemstyp</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="medlemstyp" value="standard" required>
                                <span>Standardmedlem (300 kr/år)</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="medlemstyp" value="student">
                                <span>Studentmedlem (150 kr/år)</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="medlemstyp" value="stod">
                                <span>Stödmedlem (500 kr/år)</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Intresseområden</label>
                        <div class="checkbox-group">
                            <label class="checkbox-option">
                                <input type="checkbox" name="intressen" value="programmering">
                                <span>Programmering</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="intressen" value="natverk">
                                <span>Nätverk & Säkerhet</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="intressen" value="ai">
                                <span>AI & Machine Learning</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="intressen" value="ux">
                                <span>UX & Design</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="intressen" value="startup">
                                <span>Startup & Entrepreneurskap</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <label for="hur_hittade">Hur hittade du oss?</label>
                        <select id="hur_hittade" name="hur_hittade">
                            <option value="">-- Välj --</option>
                            <option value="google">Google</option>
                            <option value="facebook">Facebook</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="van">Rekommendation från vän</option>
                            <option value="event">Evenemang</option>
                            <option value="annat">Annat</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-option">
                            <input type="checkbox" id="nyhetsbrev" name="nyhetsbrev" checked>
                            <span>Ja, jag vill få nyhetsbrev via e-post</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Bli medlem</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('memberForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.add('show');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
<script src="formfiller-logger.js"></script>
</body>
</html>
