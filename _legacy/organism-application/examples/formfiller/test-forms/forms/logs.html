<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormFiller - Log Viewer</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00d9ff; margin-bottom: 10px; }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button, select {
            background: #16213e;
            color: #eee;
            border: 1px solid #0f3460;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #0f3460; }
        select { padding: 10px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-card .label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 10px 20px;
            background: #16213e;
            border: none;
            color: #888;
            cursor: pointer;
        }
        .tab.active {
            background: #0f3460;
            color: #00d9ff;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .log-list {
            max-height: 500px;
            overflow-y: auto;
            background: #0d0d1a;
            border-radius: 8px;
        }
        .log-entry {
            padding: 10px 15px;
            border-bottom: 1px solid #1a1a2e;
            font-size: 13px;
        }
        .log-entry:hover { background: #16213e; }
        .log-entry .event {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 10px;
        }
        .log-entry .event.form_load { background: #1e88e5; }
        .log-entry .event.field_focus { background: #43a047; }
        .log-entry .event.field_change { background: #fb8c00; }
        .log-entry .event.button_click { background: #8e24aa; }
        .log-entry .event.form_submit { background: #e53935; }
        .log-entry .event.validation_error { background: #d32f2f; }
        .log-entry .event.step_change { background: #00acc1; }
        .log-entry .time { color: #666; font-size: 11px; }
        .log-entry .path { color: #888; }
        .log-entry .data { color: #aaa; margin-top: 5px; font-size: 12px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0d0d1a;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #1a1a2e;
        }
        th { background: #16213e; color: #00d9ff; }
        tr:hover { background: #16213e; }
        .suggestion-source {
            display: inline-block;
            padding: 2px 8px;
            background: #43a047;
            border-radius: 4px;
            font-size: 11px;
        }
        .suggestion-source.null { background: #666; }
        pre {
            background: #0d0d1a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
        .error { color: #e53935; }
        .back-link {
            color: #00d9ff;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Forms</a>
    <h1>FormFiller Log Viewer</h1>

    <div class="toolbar">
        <button onclick="loadLogs()">Refresh</button>
        <button onclick="loadAnalysis()">Analysis</button>
        <button onclick="loadSuggestions()">Field Suggestions</button>
        <button onclick="clearLogs()">Clear Logs</button>
        <button onclick="downloadLogs()">Download</button>
        <select id="eventFilter" onchange="loadLogs()">
            <option value="">All Events</option>
            <option value="form_load">form_load</option>
            <option value="field_focus">field_focus</option>
            <option value="field_change">field_change</option>
            <option value="button_click">button_click</option>
            <option value="form_submit">form_submit</option>
            <option value="validation_error">validation_error</option>
            <option value="step_change">step_change</option>
        </select>
        <select id="limitSelect" onchange="loadLogs()">
            <option value="50">Last 50</option>
            <option value="100" selected>Last 100</option>
            <option value="500">Last 500</option>
            <option value="1000">Last 1000</option>
        </select>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="value" id="statTotal">-</div>
            <div class="label">Total Logs</div>
        </div>
        <div class="stat-card">
            <div class="value" id="statSessions">-</div>
            <div class="label">Sessions</div>
        </div>
        <div class="stat-card">
            <div class="value" id="statSubmits">-</div>
            <div class="label">Submissions</div>
        </div>
        <div class="stat-card">
            <div class="value" id="statErrors">-</div>
            <div class="label">Errors</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showPanel('logs')">Logs</button>
        <button class="tab" onclick="showPanel('analysis')">Analysis</button>
        <button class="tab" onclick="showPanel('suggestions')">Suggestions</button>
    </div>

    <div id="logsPanel" class="panel active">
        <div class="log-list" id="logList">
            <p style="padding: 20px; color: #888;">Loading...</p>
        </div>
    </div>

    <div id="analysisPanel" class="panel">
        <pre id="analysisContent">Click "Analysis" button to load...</pre>
    </div>

    <div id="suggestionsPanel" class="panel">
        <div id="suggestionsContent">
            <p style="color: #888;">Click "Field Suggestions" button to load...</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001';

        async function loadLogs() {
            const event = document.getElementById('eventFilter').value;
            const limit = document.getElementById('limitSelect').value;

            let url = `${API_BASE}/api/logs?limit=${limit}`;
            if (event) url += `&event=${event}`;

            try {
                const res = await fetch(url);
                const logs = await res.json();

                const list = document.getElementById('logList');
                if (logs.length === 0) {
                    list.innerHTML = '<p style="padding: 20px; color: #888;">No logs found</p>';
                    return;
                }

                list.innerHTML = logs.reverse().map(log => `
                    <div class="log-entry">
                        <span class="event ${log.event}">${log.event}</span>
                        <span class="time">${new Date(log.timestamp).toLocaleString()}</span>
                        <span class="path">${log.pathname || ''}</span>
                        ${log.data ? `<div class="data">${JSON.stringify(log.data).substring(0, 200)}</div>` : ''}
                    </div>
                `).join('');

                // Update stats
                loadStats();
            } catch (e) {
                document.getElementById('logList').innerHTML = `<p class="error" style="padding: 20px;">Error: ${e.message}. Is the server running?</p>`;
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/analysis`);
                const data = await res.json();

                document.getElementById('statTotal').textContent = data.totalLogs;
                document.getElementById('statSessions').textContent = data.sessions;
                document.getElementById('statSubmits').textContent = data.eventCounts?.form_submit || 0;
                document.getElementById('statErrors').textContent = data.eventCounts?.validation_error || 0;
            } catch (e) {
                // Ignore
            }
        }

        async function loadAnalysis() {
            try {
                const res = await fetch(`${API_BASE}/api/analysis`);
                const data = await res.json();
                document.getElementById('analysisContent').textContent = JSON.stringify(data, null, 2);
                showPanel('analysis');
            } catch (e) {
                document.getElementById('analysisContent').textContent = `Error: ${e.message}`;
            }
        }

        async function loadSuggestions() {
            try {
                const res = await fetch(`${API_BASE}/api/suggestions`);
                const data = await res.json();

                let html = '';
                for (const [path, fields] of Object.entries(data)) {
                    html += `<h3 style="color: #00d9ff; margin-top: 20px;">${path}</h3>`;
                    html += `<table>
                        <tr>
                            <th>Selector</th>
                            <th>Type</th>
                            <th>Label</th>
                            <th>Suggested Source</th>
                            <th>Required</th>
                        </tr>`;

                    fields.forEach(f => {
                        const sourceClass = f.source ? '' : 'null';
                        html += `<tr>
                            <td><code>${f.selector}</code></td>
                            <td>${f.field_type}</td>
                            <td>${f.label || '-'}</td>
                            <td><span class="suggestion-source ${sourceClass}">${f.source || 'Unknown'}</span></td>
                            <td>${f.required ? '✓' : ''}</td>
                        </tr>`;
                    });

                    html += '</table>';
                }

                document.getElementById('suggestionsContent').innerHTML = html || '<p style="color: #888;">No suggestions yet. Visit some forms first!</p>';
                showPanel('suggestions');
            } catch (e) {
                document.getElementById('suggestionsContent').innerHTML = `<p class="error">Error: ${e.message}</p>`;
            }
        }

        async function clearLogs() {
            if (!confirm('Clear all logs?')) return;
            try {
                await fetch(`${API_BASE}/api/logs`, { method: 'DELETE' });
                loadLogs();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function downloadLogs() {
            // Get from localStorage
            const logs = JSON.parse(localStorage.getItem('formfiller_logs') || '[]');
            const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `formfiller-logs-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name + 'Panel').classList.add('active');
            event.target.classList.add('active');
        }

        // Initial load
        loadLogs();
    </script>
</body>
</html>
