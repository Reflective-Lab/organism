<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktformulär</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Tillbaka till formulärlistan</a>

    <div class="form-container">
        <div class="form-header" style="background: linear-gradient(135deg, #5ee7df 0%, #b490ca 100%); border-top-color: #45b5a9;">
            <h1>Kontakta oss</h1>
            <p>Vi svarar inom 24 timmar</p>
        </div>

        <form id="contactForm" action="#" method="post">
            <div class="form-body">
                <div class="success-message" id="successMsg">
                    Tack för ditt meddelande! Vi återkommer så snart vi kan.
                </div>

                <div class="form-section">
                    <h2>Dina uppgifter</h2>

                    <div class="inline-fields">
                        <div class="form-group">
                            <label for="fornamn" class="required">Förnamn</label>
                            <input type="text" id="fornamn" name="fornamn" required>
                        </div>
                        <div class="form-group">
                            <label for="efternamn" class="required">Efternamn</label>
                            <input type="text" id="efternamn" name="efternamn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="epost" class="required">E-post</label>
                        <input type="email" id="epost" name="epost" required>
                    </div>

                    <div class="form-group">
                        <label for="telefon">Telefon</label>
                        <input type="tel" id="telefon" name="telefon">
                    </div>
                </div>

                <div class="form-section">
                    <h2>Ditt ärende</h2>

                    <div class="form-group">
                        <label for="arende" class="required">Typ av ärende</label>
                        <select id="arende" name="arende" required>
                            <option value="">-- Välj --</option>
                            <option value="fraga">Allmän fråga</option>
                            <option value="support">Teknisk support</option>
                            <option value="offert">Offertförfrågan</option>
                            <option value="klagomal">Klagomål</option>
                            <option value="samarbete">Samarbetsförslag</option>
                            <option value="press">Press & Media</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="amne" class="required">Ämne</label>
                        <input type="text" id="amne" name="amne" required
                               placeholder="Kort beskrivning av ärendet">
                    </div>

                    <div class="form-group">
                        <label for="meddelande" class="required">Meddelande</label>
                        <textarea id="meddelande" name="meddelande" required
                                  placeholder="Skriv ditt meddelande här..."></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <label>Hur vill du bli kontaktad?</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="kontakt_metod" value="epost" checked>
                                <span>E-post</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="kontakt_metod" value="telefon">
                                <span>Telefon</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Skicka meddelande</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.add('show');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
<script src="formfiller-logger.js"></script>
</body>
</html>
